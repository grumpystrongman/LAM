governance:
  require_governance_ready: true
  controls:
    identity: true
    policy: true
    approval: true
    audit: true
    secrets: true

rbac:
  roles:
    - Runner
    - Approver
    - WorkflowAuthor
    - Admin
    - Auditor

abac:
  require_managed_device: true
  require_compliant_device: true
  allowed_network_zones:
    - corp
    - vpn

policies:
  competitor_analysis:
    min_live_non_curated_citations: 3
  browser_worker:
    mode: local
    human_like_interaction: true
  freshness_defaults:
    enabled: true
    domains:
      web_research:
        artifact_reuse_mode: always_regenerate
        artifact_reuse_max_age_hours: 6
      job_market:
        artifact_reuse_mode: always_regenerate
        artifact_reuse_max_age_hours: 12
      competitor_analysis:
        artifact_reuse_mode: always_regenerate
        artifact_reuse_max_age_hours: 24
      study_pack:
        artifact_reuse_mode: reuse_if_recent
        artifact_reuse_max_age_hours: 72
      artifact_generation:
        artifact_reuse_mode: reuse_if_recent
        artifact_reuse_max_age_hours: 168
      email_triage:
        artifact_reuse_mode: reuse_if_recent
        artifact_reuse_max_age_hours: 12
      desktop_sequence:
        artifact_reuse_mode: reuse_if_recent
        artifact_reuse_max_age_hours: 24
  os_action_allowlist:
    - click
    - type
    - hotkey
    - wait_for
    - assert_visible
    - read_cell
    - set_cell
    - copy
    - paste
    - open_app
    - focus_window
    - navigate_url
    - extract_field
    - ask_user
    - require_approval
    - submit_action
    - screenshot_redacted
  deny_rules:
    - action: paste
      when_target_domain_not_in_allowlist: true
    - action: copy
      when_data_classification_in: [phi, pii, credential]
      and_target_app_not_trusted: true
